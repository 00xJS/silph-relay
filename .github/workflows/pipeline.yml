name: PokeUpdates Bot

on:
  schedule:
    - cron: "*/30 * * * *"   # Every 30 minutes
  workflow_dispatch:          # Allow manual trigger from GitHub UI

permissions:
  contents: write             # Needed to commit seen_ids.json back to the repo

jobs:
  post-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          RSSHUB_URL:           ${{ secrets.RSSHUB_URL }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python src/main.py

      - name: Commit updated seen_ids.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_ids.json
          git diff --cached --quiet || git commit -m "chore: update seen post IDs [skip ci]"
          git push
